# Render blueprint for the Express API (Ch 14 §14.1).
# The web app deploys separately on Vercel with root directory = "web".
services:
  - type: web
    name: ai-wealth-os-api
    runtime: node
    plan: free
    region: singapore # same region as the Neon database
    healthCheckPath: /health

    # Build from the repo root so npm workspaces resolve @wealth-os/types,
    # then apply any pending migrations before the new version serves traffic.
    # --include=dev is required: Render sets NODE_ENV=production, and npm then
    # SKIPS devDependencies — which would leave the Prisma CLI missing at build.
    buildCommand: >-
      npm ci --include=dev &&
      npx prisma migrate deploy --schema api/prisma/schema.prisma &&
      npx prisma generate --schema api/prisma/schema.prisma
    startCommand: npm run start -w @wealth-os/api

    envVars:
      - key: NODE_ENV
        value: production
      # Set these in the Render dashboard — never commit real values (Ch 12).
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: WEB_ORIGIN
        sync: false # e.g. https://ai-wealth-os.vercel.app
      # No AI vendor key: capture is a deterministic parser, not a model call
      # (ADR-001). Nothing here talks to a third party.
